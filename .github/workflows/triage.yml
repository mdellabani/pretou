name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Validate issue template
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";

            // Check if body is too short (likely spam or empty template)
            if (body.trim().length < 20) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: "This issue was automatically closed because the description is too short. Please provide more details using one of the issue templates."
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed",
                labels: ["invalid"]
              });
              return;
            }

            // Check for excessive links (spam indicator)
            const linkCount = (body.match(/https?:\/\//g) || []).length;
            if (linkCount > 5) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: "This issue was automatically closed as potential spam (too many links). If this was a mistake, please reopen."
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed",
                labels: ["spam"]
              });
            }
